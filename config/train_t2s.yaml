# ===================== Path Configuration =====================
log_dir: logs/t2s_train

seed: 42

paths:
  tokenizer_path: ./checkpoints
  w2v_bert_path: pretrained/w2v-bert-2.0
  w2v_stat: ./checkpoints/wav2vec2bert_stats.pt
  t2s_checkpoint: checkpoints/t2s_model.safetensors

# ===================== Data Configuration =====================
data:
  train_data_path:
    - data/train.tsv
  val_data_path:
    - data/val.tsv
  batch_size: 2
  num_workers: 4
  sample_rate: 16000

# ===================== Model Configuration (T2S) =====================
t2s_model:
  num_layers: 24
  model_dim: 1280
  num_heads: 20
  max_text_seq_lens: 520
  max_semantic_seq_lens: 1520
  vocab_size: 32000
  semantic_vocab_size: 8194
  text_embedding_dim: 4096
  speaker_embedding_dim: 1024
  start_semantic_token: 8192
  stop_semantic_token: 8193

# ===================== Training Configuration =====================
training:
  precision: 16-mixed
  epochs: 100
  gradient_clip: 1.0
  accumulate_grad_batches: 1
  val_check_interval: 1000
  limit_val_batches: 10
  save_every_n_steps: 2000
  log_every_n_steps: 10
  benchmark: true

# ===================== Optimizer Configuration =====================
optimizer:
  optimizer_type: adamw
  learning_rate: 2.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8

# ===================== Learning Rate Scheduler =====================
scheduler:
  scheduler_type: cosine
  num_warmup_steps: 2000
  num_training_steps: 100000
